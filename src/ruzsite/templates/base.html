<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}RUZ{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body data-authenticated="{{ 'true' if authenticated else 'false' }}">

{% if authenticated %}
<div class="app-shell">
  <main class="main-pane">
    <div class="page-body">
      <div class="page-body-inner">
        <div class="page-header-inline">
          <div class="page-heading-text">{% block page_heading %}{% endblock %}</div>
          <div class="page-actions">{% block page_actions %}{% endblock %}</div>
        </div>
        <div class="page-content">
{% endif %}

        {% block content %}{% endblock %}

{% if authenticated %}
        </div>
      </div>
    </div>
  </main>

  {# ── Bottom nav ── #}
  <nav class="mobile-bottomnav">
    <ul class="bottomnav-list">
      <li>
        <a href="/" class="bottomnav-item {% if current_page == 'home' %}is-active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Home
        </a>
      </li>
      <li>
        <a href="/schedule" class="bottomnav-item {% if current_page == 'schedule' %}is-active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Schedule
        </a>
      </li>
    </ul>
  </nav>

</div>
{% endif %}

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/static/js/app.js" defer></script>
<script src="/static/js/telegram-auth.js" defer></script>
</body>
</html>
